<template>
    <main class="dashboard-panel">
        <header class="dashboard-header animate-fade-in">
            <div>
                <h1 class="text-gradient">Intelligent Command Center</h1>
                <p class="text-muted">Real-time pipeline analysis driven by Lead Lift AI.</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline">
                    <span>Export Report</span>
                </button>
            </div>
        </header>

        <!-- KPI Metrics Row -->
        <div class="metrics-grid">
            <div class="metric-card glass-panel hoverable animate-fade-in" style="animation-delay: 0.1s;">
                <h3 class="metric-title">Active Pipeline</h3>
                <p class="metric-value text-primary">{totalPipelineValue}</p>
                <div class="metric-trend up">+12.4% vs last quarter</div>
            </div>
            
            <div class="metric-card glass-panel hoverable animate-fade-in" style="animation-delay: 0.2s;">
                <h3 class="metric-title">Predicted Closures</h3>
                <p class="metric-value text-success">{predictedClosuresCount}</p>
                <div class="metric-trend">High probability (≥70%)</div>
            </div>
            
            <div class="metric-card glass-panel hoverable animate-fade-in" style="animation-delay: 0.3s;">
                <h3 class="metric-title">At Risk Accounts</h3>
                <p class="metric-value text-danger">{atRiskCount}</p>
                <div class="metric-trend down">Requires immediate action</div>
            </div>
        </div>

        <!-- Pipeline List -->
        <section class="pipeline-section glass-panel animate-fade-in" style="animation-delay: 0.4s;">
            <div class="pipeline-header">
                <h2>Intelligent Opportunity Pipeline</h2>
                <div class="filters">
                    <span class="badge success">All Accounts</span>
                </div>
            </div>

            <template if:true={opportunities.length}>
                <div class="pipeline-list">
                    <template for:each={opportunities} for:item="opp">
                        <div key={opp.id} class="pipeline-row" data-id={opp.id} onclick={handleRowClick}>
                            <div class="row-main">
                                <h3>{opp.company}</h3>
                                <p class="text-muted">{opp.stage} &bull; {opp.formattedValue}</p>
                            </div>
                            <div class="row-stats">
                                <div class="stat-group">
                                    <span class="stat-label">Win Prob</span>
                                    <span class="stat-value">{opp.probability}%</span>
                                </div>
                                <div class="stat-group">
                                    <span class="stat-label">AI Risk</span>
                                    <span if:true={opp.isLowRisk} class="badge success">Low</span>
                                    <span if:true={opp.isMediumRisk} class="badge warning">Medium</span>
                                    <span if:true={opp.isHighRisk} class="badge danger">High</span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
            <template if:false={opportunities.length}>
                <div class="empty-state text-muted">
                    <p>No active pipeline data found. Load a dataset to begin AI analysis.</p>
                </div>
            </template>
        </section>
    </main>

    <!-- Account Details Drawer -->
    <template if:true={isDrawerOpen}>
        <div class="drawer-overlay" onclick={closeDrawer}></div>
        <aside class="account-drawer glass-panel animate-slide-in-right">
            <div class="drawer-header border-bottom">
                <div>
                    <h2 class="text-gradient">{selectedAccount.company}</h2>
                    <span class="text-muted">{selectedAccount.stage}</span>
                </div>
                <button class="close-btn" onclick={closeDrawer}>×</button>
            </div>
            
            <div class="drawer-content">
                <!-- Top Metrics -->
                <div class="drawer-metrics">
                    <div class="stat-box">
                        <span class="stat-label">Deal Value</span>
                        <span class="stat-value text-primary">{selectedAccount.formattedValue}</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Win Prob.</span>
                        <span class="stat-value">{selectedAccount.probability}%</span>
                    </div>
                </div>

                <!-- AI Account Summary -->
                <div class="insights-section border-secondary mt-4">
                    <span class="draft-badge">AI Account Summary</span>
                    <p class="summary-text text-muted">{computedSummary}</p>
                </div>

                <!-- Next Best Action -->
                <div class="insights-section border-primary mt-4">
                    <span class="draft-badge bg-primary">Next Best Action</span>
                    <h4 class="action-title">{computedNBA.title}</h4>
                    <p class="summary-text text-muted">{computedNBA.description}</p>
                    <button class="btn btn-primary w-full mt-3">Execute Action</button>
                </div>
            </div>
        </aside>
    </template>
</template>
